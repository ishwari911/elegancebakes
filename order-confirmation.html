<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Confirmed! | Elegance Bakes</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #f5ecea;
            --primary: #6a3c3c;
            --primary-light: #8b5b5b;
            --gold: #d4a574;
            --card-bg: linear-gradient(135deg, #fff7f4, #f8f4f1);
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.12);
            --border: rgba(106, 60, 60, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Playfair Display", serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 50px 44px;
            box-shadow: var(--shadow);
            max-width: 640px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .success-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            font-size: 42px;
            box-shadow: 0 12px 40px rgba(46, 204, 113, 0.4);
            animation: popIn 0.5s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes popIn {
            from {
                transform: scale(0);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .title {
            font-family: "Great Vibes", cursive;
            font-size: 52px;
            color: var(--primary);
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 17px;
            color: #8b5b5b;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .order-details {
            background: white;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            margin-bottom: 28px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 11px 0;
            border-bottom: 1px dashed var(--border);
            gap: 16px;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-size: 13px;
            color: #b09080;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            flex-shrink: 0;
        }

        .detail-value {
            font-size: 14px;
            color: var(--primary);
            font-weight: 700;
            text-align: right;
            word-break: break-word;
        }

        .items-list {
            background: white;
            border-radius: 20px;
            padding: 20px 24px;
            border: 1px solid var(--border);
            margin-bottom: 28px;
            text-align: left;
        }

        .items-list h3 {
            font-size: 16px;
            color: var(--primary);
            margin-bottom: 14px;
            font-weight: 700;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px dashed var(--border);
            font-size: 14px;
            color: #5b3a3a;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-item-qty {
            background: rgba(106, 60, 60, 0.08);
            color: var(--primary);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-left: 8px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            background: linear-gradient(135deg, #6a3c3c, #8b5b5b);
            border-radius: 14px;
            margin-bottom: 28px;
        }

        .total-row span {
            color: rgba(255, 255, 255, 0.85);
            font-size: 15px;
        }

        .total-row strong {
            color: white;
            font-size: 22px;
            font-weight: 700;
        }

        .email-notice {
            background: rgba(46, 204, 113, 0.08);
            border: 1px solid rgba(46, 204, 113, 0.25);
            border-radius: 14px;
            padding: 14px 20px;
            font-size: 14px;
            color: #27ae60;
            margin-bottom: 28px;
        }

        .btn-row {
            display: flex;
            gap: 14px;
            flex-direction: column;
        }

        .btn {
            padding: 15px 24px;
            border-radius: 16px;
            font-family: "Playfair Display", serif;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6a3c3c, #8b5b5b);
            color: white;
            box-shadow: 0 8px 24px rgba(106, 60, 60, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 36px rgba(106, 60, 60, 0.4);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: white;
        }

        .payment-id {
            font-size: 11px;
            color: #b09080;
            margin-top: 20px;
        }

        @media (max-width: 500px) {
            .card {
                padding: 36px 24px;
            }

            .title {
                font-size: 40px;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="success-icon">🎂</div>
        <h1 class="title">Order Confirmed!</h1>
        <p class="subtitle">Thank you for your order. We'll bake it fresh with love and deliver it to you right on time.
            🍰</p>

        <div class="order-details" id="orderDetails">
            <!-- filled by JS -->
        </div>

        <div class="items-list" id="itemsList" style="display:none;">
            <h3>🛒 Items Ordered</h3>
            <div id="itemsContainer"></div>
        </div>

        <div class="total-row" id="totalRow" style="display:none;">
            <span>Grand Total (incl. 5% tax)</span>
            <strong id="grandTotalDisplay">₹0</strong>
        </div>

        <div class="email-notice" id="emailNotice" style="display:none;">
            📧 A confirmation email has been sent to <strong id="userEmail">your email</strong>.
        </div>

        <div class="btn-row">
            <a href="dashboard.html" class="btn btn-primary">📋 View My Orders</a>
            <a href="menu.html" class="btn btn-secondary">🍰 Continue Shopping</a>
        </div>

        <p class="payment-id" id="paymentIdDisplay"></p>
    </div>

    <script>
        function formatPrice(num) {
            return '₹' + Math.round(num || 0).toLocaleString('en-IN');
        }

        // Read order data from sessionStorage (set by cart.html after payment)
        const orderData = (() => {
            try {
                return JSON.parse(sessionStorage.getItem('lastOrder')) || null;
            } catch { return null; }
        })();

        const detailsEl = document.getElementById('orderDetails');
        const itemsListEl = document.getElementById('itemsList');
        const itemsContainerEl = document.getElementById('itemsContainer');
        const totalRowEl = document.getElementById('totalRow');
        const grandTotalEl = document.getElementById('grandTotalDisplay');
        const emailNoticeEl = document.getElementById('emailNotice');
        const userEmailEl = document.getElementById('userEmail');
        const paymentIdEl = document.getElementById('paymentIdDisplay');

        if (orderData) {
            // Address
            const addr = orderData.delivery_address || '—';
            const date = orderData.delivery_date
                ? new Date(orderData.delivery_date).toLocaleDateString('en-IN', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' })
                : '—';
            const payId = orderData.payment_id || '';
            const email = orderData.email || '';

            detailsEl.innerHTML = `
        <div class="detail-row">
          <span class="detail-label">📍 Delivery Address</span>
          <span class="detail-value">${addr}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">🗓️ Expected Delivery</span>
          <span class="detail-value">${date}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">💳 Payment Status</span>
          <span class="detail-value" style="color:#2ecc71;">✅ Paid</span>
        </div>
      `;

            // Items
            if (orderData.items && orderData.items.length > 0) {
                itemsListEl.style.display = '';
                totalRowEl.style.display = '';

                let grandTotal = 0;
                itemsContainerEl.innerHTML = orderData.items.map(item => {
                    const lineTotal = item.price * item.qty;
                    const lineTotalWithTax = Math.round(lineTotal * 1.05 * 100) / 100;
                    grandTotal += lineTotalWithTax;
                    return `
            <div class="order-item">
              <span>${item.name}<span class="order-item-qty">x${item.qty}</span></span>
              <span style="font-weight:700;">${formatPrice(item.price * item.qty)}</span>
            </div>`;
                }).join('');

                grandTotalEl.textContent = formatPrice(grandTotal);
            }

            // Email notice
            if (email) {
                emailNoticeEl.style.display = '';
                userEmailEl.textContent = email;
            }

            // Payment ID
            if (payId) {
                paymentIdEl.textContent = 'Payment ID: ' + payId;
            }

            // Clear the session data so refreshing doesn't re-show stale info
            sessionStorage.removeItem('lastOrder');
        } else {
            // No order data — user might have navigated directly
            detailsEl.innerHTML = `
        <div class="detail-row">
          <span class="detail-label">Status</span>
          <span class="detail-value" style="color:#2ecc71;">✅ Order Placed Successfully</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Next Step</span>
          <span class="detail-value">Check your email for confirmation details</span>
        </div>
      `;
        }
    </script>
</body>

</html>
