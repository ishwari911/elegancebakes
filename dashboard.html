<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>My Dashboard — Elegance Bakes</title>
   <link rel="icon" href="logo.png">
   <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600;700&display=swap"
      rel="stylesheet">
   <style>
      *,
      *::before,
      *::after {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
      }

      body {
         font-family: 'Playfair Display', serif;
         background: linear-gradient(150deg, #f8e8d9 0%, #f5ecea 60%, #fdf6f0 100%);
         min-height: 100vh;
      }

      /* ── TOP NAV ── */
      .topnav {
         background: #d9c7bd;
         padding: 18px 40px;
         display: flex;
         align-items: center;
         justify-content: space-between;
         position: sticky;
         top: 0;
         z-index: 100;
         box-shadow: 0 2px 12px rgba(106, 60, 60, 0.10);
      }

      .topnav-logo {
         display: flex;
         align-items: center;
         gap: 12px;
         cursor: pointer;
         text-decoration: none;
      }

      .topnav-logo img {
         width: 50px;
         border-radius: 50%;
      }

      .topnav-logo span {
         font-family: 'Great Vibes', cursive;
         font-size: 1.9rem;
         color: #6a3c3c;
      }

      .topnav-links {
         display: flex;
         gap: 28px;
         align-items: center;
      }

      .topnav-links a {
         font-family: 'Playfair Display', serif;
         color: #6a3c3c;
         text-decoration: none;
         font-size: 15px;
         font-weight: 600;
         transition: color 0.2s;
      }

      .topnav-links a:hover {
         color: #a0724a;
      }

      .btn-logout {
         background: linear-gradient(135deg, #dc3545, #c82333);
         color: white;
         border: none;
         padding: 10px 22px;
         border-radius: 25px;
         font-family: 'Playfair Display', serif;
         font-size: 14px;
         font-weight: 600;
         cursor: pointer;
         transition: all 0.25s;
      }

      .btn-logout:hover {
         transform: translateY(-2px);
         box-shadow: 0 8px 20px rgba(220, 53, 69, 0.4);
      }

      /* ── PAGE WRAPPER ── */
      .page {
         max-width: 1100px;
         margin: 40px auto;
         padding: 0 24px 60px;
      }

      /* ── WELCOME BANNER ── */
      .welcome-banner {
         background: white;
         border-radius: 24px;
         padding: 36px 40px;
         box-shadow: 0 18px 50px rgba(212, 165, 116, 0.18);
         display: flex;
         align-items: center;
         gap: 28px;
         margin-bottom: 32px;
         border: 1px solid rgba(212, 165, 116, 0.2);
      }

      .avatar {
         width: 90px;
         height: 90px;
         border-radius: 50%;
         background: linear-gradient(135deg, #d4a574, #e6c7a3);
         display: flex;
         align-items: center;
         justify-content: center;
         font-size: 2.6rem;
         color: white;
         flex-shrink: 0;
         box-shadow: 0 8px 24px rgba(212, 165, 116, 0.4);
      }

      .welcome-text h1 {
         font-family: 'Great Vibes', cursive;
         font-size: 2.8rem;
         color: #d4a574;
         margin-bottom: 4px;
      }

      .welcome-text p {
         color: #8b735f;
         font-size: 15px;
      }

      /* ── GRID ── */
      .dash-grid {
         display: grid;
         grid-template-columns: 1fr 1.5fr;
         gap: 28px;
      }

      @media (max-width: 768px) {
         .welcome-banner {
            flex-direction: column;
            text-align: center;
         }

         .dash-grid {
            grid-template-columns: 1fr;
         }
      }

      /* ── CARD ── */
      .card {
         background: white;
         border-radius: 22px;
         padding: 30px 32px;
         box-shadow: 0 18px 50px rgba(212, 165, 116, 0.14);
         border: 1px solid rgba(212, 165, 116, 0.2);
      }

      .card-title {
         font-family: 'Great Vibes', cursive;
         font-size: 2rem;
         color: #d4a574;
         margin-bottom: 22px;
         padding-bottom: 12px;
         border-bottom: 1px solid rgba(212, 165, 116, 0.25);
      }

      /* ── PROFILE DETAILS ── */
      .detail-row {
         display: flex;
         align-items: flex-start;
         gap: 12px;
         padding: 14px 0;
         border-bottom: 1px dashed rgba(212, 165, 116, 0.2);
      }

      .detail-row:last-child {
         border-bottom: none;
      }

      .detail-icon {
         font-size: 1.4rem;
         flex-shrink: 0;
         width: 28px;
         text-align: center;
      }

      .detail-label {
         font-size: 12px;
         color: #b09080;
         font-weight: 600;
         letter-spacing: 0.5px;
         text-transform: uppercase;
      }

      .detail-value {
         color: #5b3a3a;
         font-size: 15px;
         font-weight: 600;
         margin-top: 2px;
         word-break: break-word;
      }

      .quick-links {
         display: flex;
         flex-direction: column;
         gap: 12px;
         margin-top: 8px;
      }

      .quick-btn {
         display: block;
         text-align: center;
         padding: 13px 20px;
         border-radius: 14px;
         font-family: 'Playfair Display', serif;
         font-size: 15px;
         font-weight: 600;
         text-decoration: none;
         transition: all 0.25s;
         border: none;
         cursor: pointer;
         width: 100%;
      }

      .quick-btn.gold {
         background: linear-gradient(135deg, #d4a574, #a0724a);
         color: white;
         box-shadow: 0 8px 22px rgba(212, 165, 116, 0.35);
      }

      .quick-btn.gold:hover {
         transform: translateY(-3px);
         box-shadow: 0 14px 32px rgba(212, 165, 116, 0.5);
      }

      .quick-btn.outline {
         background: transparent;
         border: 2px solid #d4a574;
         color: #d4a574;
      }

      .quick-btn.outline:hover {
         background: #d4a574;
         color: white;
      }

      /* ── ORDERS TABLE ── */
      .orders-wrap {
         overflow-x: auto;
      }

      table {
         width: 100%;
         border-collapse: collapse;
         font-size: 14px;
      }

      th {
         background: rgba(212, 165, 116, 0.12);
         color: #6a3c3c;
         padding: 12px 14px;
         text-align: left;
         font-weight: 700;
         font-size: 13px;
      }

      td {
         padding: 13px 14px;
         border-bottom: 1px solid rgba(212, 165, 116, 0.15);
         color: #5b3a3a;
         vertical-align: top;
      }

      tr:last-child td {
         border-bottom: none;
      }

      tr:hover td {
         background: rgba(212, 165, 116, 0.05);
      }

      .badge {
         display: inline-block;
         padding: 4px 12px;
         border-radius: 20px;
         font-size: 12px;
         font-weight: 700;
         text-transform: capitalize;
      }

      .badge.confirmed {
         background: #cce5ff;
         color: #004085;
      }

      .badge.pending {
         background: #fff3cd;
         color: #856404;
      }

      .badge.preparing {
         background: #e8d5ff;
         color: #4a1c8c;
      }

      .badge.out_for_delivery {
         background: #d4edda;
         color: #155724;
      }

      .badge.delivered {
         background: #d4edda;
         color: #155724;
      }

      .badge.cancelled {
         background: #f8d7da;
         color: #721c24;
      }

      .delivery-date-cell {
         font-size: 13px;
         color: #6a5b58;
         white-space: nowrap;
      }

      .empty-orders {
         text-align: center;
         padding: 40px 20px;
         color: #b09080;
      }

      .empty-orders .emoji {
         font-size: 3rem;
         margin-bottom: 12px;
      }

      .empty-orders p {
         margin-bottom: 16px;
      }

      /* loader */
      .loading {
         color: #b09080;
         font-style: italic;
         text-align: center;
         padding: 20px;
      }
   </style>
</head>

<body>

   <!-- TOP NAV -->
   <nav class="topnav">
      <a class="topnav-logo" href="index.html">
         <img src="logo.png" alt="Elegance Bakes" onerror="this.style.display='none'">
         <span>Elegance Bakes</span>
      </a>
      <div class="topnav-links">
         <a href="index.html">Home</a>
         <a href="menu.html">Menu</a>
         <a href="cart.html">🛒 Cart</a>
         <button class="btn-logout" onclick="logout()">🚪 Logout</button>
      </div>
   </nav>

   <div class="page">

      <!-- WELCOME BANNER -->
      <div class="welcome-banner">
         <div class="avatar" id="userAvatar">👤</div>
         <div class="welcome-text">
            <h1 id="welcomeTitle">Welcome!</h1>
            <p id="welcomeSub">Fetching your details...</p>
         </div>
      </div>

      <div class="dash-grid">

         <!-- LEFT: PROFILE + QUICK LINKS -->
         <div style="display:flex;flex-direction:column;gap:28px;">

            <!-- Profile Card -->
            <div class="card">
               <h2 class="card-title">My Profile</h2>
               <div id="profileSection" class="loading">Loading...</div>
            </div>

            <!-- Quick Actions -->
            <div class="card">
               <h2 class="card-title">Quick Actions</h2>
               <div class="quick-links">
                  <a href="menu.html" class="quick-btn gold">🍰 Browse Menu</a>
                  <a href="cart.html" class="quick-btn outline">🛒 View Cart</a>
                  <button class="quick-btn outline" onclick="logout()">🚪 Logout</button>
               </div>
            </div>
         </div>

         <!-- RIGHT: ORDERS -->
         <div class="card">
            <h2 class="card-title">My Orders</h2>
            <div class="orders-wrap">
               <div id="ordersSection" class="loading">Loading orders...</div>
            </div>
         </div>

      </div>
   </div>

   <script>
      // ── LOAD PROFILE ──
      async function loadProfile() {
         try {
            const res = await fetch('user-profile.php');
            const data = await res.json();

            if (!data.success) {
               // Not logged in → redirect to login
               window.location.href = 'login.html';
               return;
            }

            // Update banner
            const initial = (data.name || '?').charAt(0).toUpperCase();
            document.getElementById('userAvatar').textContent = initial;
            document.getElementById('welcomeTitle').textContent = `Welcome, ${data.name}!`;
            document.getElementById('welcomeSub').textContent = data.email;

            // Also persist to localStorage (keep header in sync)
            localStorage.setItem('userName', data.name);

            // Profile card
            document.getElementById('profileSection').innerHTML = `
        <div class="detail-row">
          <span class="detail-icon">👤</span>
          <div><div class="detail-label">Full Name</div><div class="detail-value">${data.name}</div></div>
        </div>
        <div class="detail-row">
          <span class="detail-icon">📧</span>
          <div><div class="detail-label">Email</div><div class="detail-value">${data.email}</div></div>
        </div>
        <div class="detail-row">
          <span class="detail-icon">📞</span>
          <div><div class="detail-label">Phone</div><div class="detail-value">${data.phone || '—'}</div></div>
        </div>
        <div class="detail-row">
          <span class="detail-icon">📍</span>
          <div><div class="detail-label">Delivery Address</div><div class="detail-value">${data.address || '—'}</div></div>
        </div>
        <div class="detail-row">
          <span class="detail-icon">🏷️</span>
          <div><div class="detail-label">Pincode</div><div class="detail-value">${data.pincode || '—'}</div></div>
        </div>
      `;
         } catch {
            window.location.href = 'login.html';
         }
      }

      // ── LOAD ORDERS ──
      async function loadOrders() {
         try {
            const res = await fetch('user-profile.php?action=orders');
            const data = await res.json();
            const el = document.getElementById('ordersSection');

            if (!data.orders || data.orders.length === 0) {
               el.innerHTML = `
          <div class="empty-orders">
            <div class="emoji">🧁</div>
            <p>No orders yet.</p>
            <a href="menu.html" style="color:#d4a574;font-weight:600;text-decoration:none;">Start shopping →</a>
          </div>`;
               return;
            }

            let rows = data.orders.map(o => {
               const name = o.cake_name || 'Custom Item';
               const orderDate = new Date(o.order_date).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
               const delivDate = o.delivery_date
                  ? new Date(o.delivery_date).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })
                  : '—';
               const total = '₹' + parseFloat(o.total_price).toLocaleString('en-IN', { minimumFractionDigits: 2 });
               const badge = `<span class="badge ${o.status}">${o.status.replace(/_/g, ' ')}</span>`;
               const addr = o.delivery_address ? o.delivery_address.substring(0, 40) + (o.delivery_address.length > 40 ? '…' : '') : '—';
               return `<tr>
          <td><strong>#${o.id}</strong></td>
          <td>${name}</td>
          <td style="text-align:center;">${o.quantity}</td>
          <td><strong>${total}</strong></td>
          <td>${badge}</td>
          <td class="delivery-date-cell">${delivDate}</td>
          <td style="font-size:12px;color:#8b735f;max-width:140px;word-break:break-word;" title="${o.delivery_address || ''}">${addr}</td>
          <td style="font-size:12px;color:#8b735f;">${orderDate}</td>
        </tr>`;
            }).join('');

            el.innerHTML = `
        <table>
          <thead><tr>
            <th>Order</th><th>Item</th><th>Qty</th><th>Total</th><th>Status</th><th>Delivery Date</th><th>Address</th><th>Ordered</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
         } catch {
            document.getElementById('ordersSection').innerHTML =
               '<p style="color:#c0392b;text-align:center;">Could not load orders.</p>';
         }
      }

      // ── LOGOUT ──
      function logout() {
         if (confirm('Logout from Elegance Bakes?')) {
            localStorage.removeItem('userName');
            fetch('logout.php', { method: 'POST' })
               .then(() => window.location.href = 'index.html');
         }
      }

      // ── INIT ──
      loadProfile();
      loadOrders();
   </script>
</body>

</html>
