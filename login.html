<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Elegance Bakes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600;700"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --gold-50: #f8e8d9;
            --gold-100: #f5ecea;
            --gold-300: #d4a574;
            --gold-400: #8b735f;
            --gold-500: #e6c7a3;
        }

        body {
            font-family: 'Playfair Display', serif !important;
            background: linear-gradient(135deg, var(--gold-50) 0%, var(--gold-100) 50%, var(--gold-50) 100%) !important;
        }

        h1 {
            font-family: 'Great Vibes', cursive !important;
            font-size: clamp(2.5rem, 6vw, 4rem) !important;
            color: var(--gold-300) !important;
            text-shadow: 0 2px 4px rgba(212, 165, 116, 0.3) !important;
        }

        input {
            border: 2px solid var(--gold-300) !important;
            border-radius: 12px !important;
            background: rgba(255, 255, 255, 0.9) !important;
            padding: 1.2rem !important;
            font-family: 'Playfair Display', serif !important;
        }

        input:focus {
            border-color: var(--gold-300) !important;
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.2) !important;
            transform: translateY(-2px) !important;
        }

        button {
            background: linear-gradient(135deg, var(--gold-300), var(--gold-500)) !important;
            color: white !important;
            border: none !important;
            border-radius: 12px !important;
            font-size: 1.1rem !important;
            font-weight: 600 !important;
            padding: 1.2rem !important;
            box-shadow: 0 10px 25px rgba(212, 165, 116, 0.4) !important;
        }

        button:hover {
            transform: translateY(-3px) !important;
            box-shadow: 0 20px 40px rgba(212, 165, 116, 0.6) !important;
        }

        label {
            color: var(--gold-400) !important;
            font-weight: 600 !important;
        }

        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-8">
    <!-- Loading Overlay -->
    <div id="loadingOverlay"
        style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9999;justify-content:center;align-items:center;">
        <div style="color:white;font-size:18px;">Signing you in... 🍰</div>
    </div>

    <div class="w-full max-w-md glass rounded-2xl shadow-2xl p-10 border border-gold-300/30">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold text-gold-300 mb-4">Welcome Back</h1>
            <p class="text-gold-500">Sign in to your sweet account</p>
        </div>

        <div id="errorMsg" class="p-4 bg-red-50 border-2 border-red-200 text-red-700 rounded-xl mb-6 hidden"></div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block mb-3 text-sm font-semibold text-gold-400">Email Address</label>
                <input type="email" id="email" required placeholder="hello@example.com" autocomplete="email">
            </div>

            <div>
                <label class="block mb-3 text-sm font-semibold text-gold-400">Password</label>
                <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
            </div>

            <div class="flex items-center justify-between">
                <label class="flex items-center text-sm text-gold-500">
                    <input type="checkbox" class="mr-2 w-4 h-4 border-gold-300 rounded accent-gold-300"> Remember me
                </label>
                <a href="forgot-password.html" class="text-sm text-gold-400 hover:text-gold-500">Forgot password?</a>
            </div>

            <button type="submit" class="w-full text-lg font-semibold shadow-xl">
                🎂 Sign In to Order
            </button>

            <p class="text-center text-sm text-gold-500 pt-4">
                Don't have an account? <a href="register.html"
                    class="font-semibold text-gold-300 hover:underline">Register here</a>
            </p>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('loginForm');
            const errorMsg = document.getElementById('errorMsg');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const rememberCheckbox = form.querySelector('input[type="checkbox"]');

            if (localStorage.getItem('remember_email')) {
                document.getElementById('email').value = localStorage.getItem('remember_email');
                rememberCheckbox.checked = true;
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                if (!email || !password) { showError('Please enter email and password'); return; }
                if (!email.includes('@')) { showError('Please enter valid email'); return; }

                loadingOverlay.style.display = 'flex';
                form.querySelector('button').disabled = true;

                fetch('api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                })
                    .then(res => res.json())
                    .then(data => {
                        loadingOverlay.style.display = 'none';
                        form.querySelector('button').disabled = false;

                        if (data.status === 'success') {
                            localStorage.setItem('userName', data.user_name || email.split('@')[0]);
                            if (rememberCheckbox.checked) {
                                localStorage.setItem('remember_email', email);
                            } else {
                                localStorage.removeItem('remember_email');
                            }
                            Swal.fire({ icon: 'success', title: 'Welcome Back!', text: 'Redirecting...', timer: 1200, showConfirmButton: false })
                                .then(() => { window.location.href = 'index.html'; });
                        } else {
                            showError(data.message);
                            document.getElementById('password').focus();
                        }
                    })
                    .catch(err => {
                        loadingOverlay.style.display = 'none';
                        form.querySelector('button').disabled = false;
                        showError('Network error. Please try again.');
                        console.error(err);
                    });
            });

            function showError(message) {
                errorMsg.textContent = message;
                errorMsg.style.display = 'block';
                errorMsg.scrollIntoView({ behavior: 'smooth' });
            }
        });
    </script>
</body>


</html>
