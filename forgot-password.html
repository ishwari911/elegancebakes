<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Elegance Bakes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600;700"
        rel="stylesheet">
    <style>
        :root {
            --gold-50: #f8e8d9;
            --gold-100: #f5ecea;
            --gold-300: #d4a574;
            --gold-400: #8b735f;
        }

        body {
            font-family: 'Playfair Display', serif !important;
            background: linear-gradient(135deg, var(--gold-50) 0%, var(--gold-100) 50%, var(--gold-50) 100%) !important;
        }

        h1 {
            font-family: 'Great Vibes', cursive !important;
            font-size: clamp(2.2rem, 6vw, 3.5rem) !important;
            color: var(--gold-300) !important;
        }

        input {
            border: 2px solid var(--gold-300) !important;
            border-radius: 12px !important;
            background: rgba(255, 255, 255, 0.9) !important;
            padding: 1.1rem !important;
            font-family: 'Playfair Display', serif !important;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--gold-300) !important;
            box-shadow: 0 0 0 3px rgba(212, 165, 116, .2) !important;
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4a574, #e6c7a3) !important;
            color: white !important;
            border: none !important;
            border-radius: 12px !important;
            font-family: 'Playfair Display', serif !important;
            font-size: 1.05rem !important;
            font-weight: 600 !important;
            padding: 1.1rem !important;
            cursor: pointer;
            width: 100%;
            transition: all .3s;
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 32px rgba(212, 165, 116, .5) !important;
        }

        .btn-gold:disabled {
            opacity: .6;
            transform: none !important;
        }

        .glass {
            background: rgba(255, 255, 255, .95);
            backdrop-filter: blur(20px);
        }

        label {
            color: var(--gold-400) !important;
            font-weight: 600 !important;
            display: block;
            margin-bottom: .5rem;
            font-size: .9rem;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-8">
    <div class="w-full max-w-md glass rounded-2xl shadow-2xl p-10 border border-yellow-200">

        <!-- Step 1: Email -->
        <div id="step1">
            <div class="text-center mb-8">
                <div class="text-5xl mb-3">🔑</div>
                <h1>Forgot Password</h1>
                <p class="text-sm mt-2" style="color:var(--gold-400);">Enter your registered email and we'll send you an
                    OTP to reset your password.</p>
            </div>

            <div id="msgBox" class="hidden p-4 rounded-xl mb-5 text-sm font-semibold"></div>

            <form id="emailForm" class="space-y-5">
                <div>
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="hello@example.com" required autocomplete="email">
                </div>
                <button type="submit" class="btn-gold" id="sendBtn">📨 Send Reset OTP</button>
            </form>
        </div>

        <!-- Step 2: OTP + New Password -->
        <div id="step2" class="hidden">
            <div class="text-center mb-8">
                <div class="text-5xl mb-3">🔐</div>
                <h1>Reset Password</h1>
                <p class="text-sm mt-2" style="color:var(--gold-400);">Check your email for the 6-digit OTP and set a
                    new password.</p>
            </div>

            <div id="msg2Box" class="hidden p-4 rounded-xl mb-5 text-sm font-semibold"></div>

            <form id="resetForm" class="space-y-5">
                <div>
                    <label for="otp">6-Digit OTP</label>
                    <input type="text" id="otp" placeholder="••••••" maxlength="6" inputmode="numeric" required>
                </div>
                <div>
                    <label for="newPass">New Password</label>
                    <input type="password" id="newPass" placeholder="Minimum 8 characters" minlength="8" required>
                </div>
                <div>
                    <label for="confirmPass">Confirm Password</label>
                    <input type="password" id="confirmPass" placeholder="Repeat new password" required>
                </div>
                <button type="submit" class="btn-gold" id="resetBtn">✅ Reset Password</button>
            </form>
        </div>

        <p class="text-center text-sm mt-6" style="color:var(--gold-400);">
            Remember it? <a href="login.html" style="color:var(--gold-300);font-weight:700;">Sign in →</a>
        </p>
    </div>

    <script>
        let userEmail = '';

        function showMsg(boxId, text, ok) {
            const box = document.getElementById(boxId);
            box.textContent = text;
            box.className = ok
                ? 'p-4 rounded-xl mb-5 text-sm font-semibold bg-green-50 border-2 border-green-300 text-green-700'
                : 'p-4 rounded-xl mb-5 text-sm font-semibold bg-red-50 border-2 border-red-200 text-red-700';
        }

        // STEP 1 — send OTP
        document.getElementById('emailForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('sendBtn');
            userEmail = document.getElementById('email').value.trim();
            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const res = await fetch('api/forgot_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                } else {
                    showMsg('msgBox', '❌ ' + data.message, false);
                }
            } catch {
                showMsg('msgBox', '❌ Server error. Is XAMPP running?', false);
            } finally {
                btn.disabled = false;
                btn.textContent = '📨 Send Reset OTP';
            }
        });

        // STEP 2 — verify OTP + set new password
        document.getElementById('resetForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('resetBtn');
            const otp = document.getElementById('otp').value.trim();
            const newPass = document.getElementById('newPass').value;
            const confirm = document.getElementById('confirmPass').value;

            if (newPass !== confirm) {
                showMsg('msg2Box', '❌ Passwords do not match.', false);
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const res = await fetch('api/reset_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, otp, new_password: newPass })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    showMsg('msg2Box', '✅ Password reset! Redirecting to login…', true);
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    showMsg('msg2Box', '❌ ' + data.message, false);
                }
            } catch {
                showMsg('msg2Box', '❌ Server error. Is XAMPP running?', false);
            } finally {
                btn.disabled = false;
                btn.textContent = '✅ Reset Password';
            }
        });
    </script>
</body>

</html>
